<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contato@pizzariamolhiolo.com</title>
  <link rel="stylesheet" href="CSS/style2.css">
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
     <header id="cabecalho2">
        <h2 id="titulo2">Pizzaria Molhiolo</h2>
        <img class="steve02" src="IMG/steve3.png">
        <p id="subtitulo2">Onde o miolo é quase tão especial quanto a garota que você ama</p>
     </header>
    <!-- menu -->
     <nav id="navegacao2">
        <span class="menu3-item"><a href="http://127.0.0.1:5500/index.html">VOLTAR</a></span>
     </nav>
     <main>
  <div class="form-container">
    <h2>CONTATO 💬</h2>
    <form action="#" method="post">
      <div class="form-group">
        <label for="nome">Nome do cliente</label>
        <input type="text" placeholder="Exemplo: Ronildo Aguas"  id="nome" name="nome" required>
      </div>
      <div class="form-group">
        <label for="email">E-mail do cliente</label>
        <input type="email" placeholder="Exemplo: Ronildoaguas@yahoo.com" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="assunto">Tipo de pizza</label>
        <input type="text" placeholder="Exemplo: Pizza de Calabresa" id="assunto" name="assunto" required>
      </div>
      <div class="form-group">
        <label for="mensagem">Avaliação</label>
        <textarea placeholder="Exemplo: 3/5 estrelas, pizza veio molhada mas o entregador é bonitinho" id="mensagem" name="mensagem" required></textarea>
        <h3>Rua Pizzaiolo Maluco</h3>
        <h3>(85) 4002-8922</h3>
        <h3>contato@pizzariamolhiolo</h3>
      </div>
      <div style="margin-bottom: 30px">
      <button type="submit" class="btn-submit">ENVIAR</button>
      <button type="reset" class="btn-reset">LIMPAR</button>
      </div>
    </form>
  </div>
</body>
</html>

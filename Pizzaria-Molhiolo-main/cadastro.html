  <div class="form-container">
    <h2>CADASTRO ✍️</h2>
    <form action="#" method="post">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" placeholder="Exemplo: Ronildo Sucos"  id="nome" name="nome" required maxlength="100">
      </div>
      <div class="form-group">
        <label for="email">E-mail completo</label>
        <input type="email" placeholder="Exemplo: Ronildosucos@hotmail.com" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="assunto">CPF (Opcional)</label>
        <input type="number" placeholder="Exemplo: 123456789-10" id="assunto" name="assunto" optional maxlength="11">
      </div>
      <div class="form-group">
        <label for="assunto">Número de telefone</label>
        <input type="text" placeholder="Exemplo: 85 98765-4321" id="assunto" name="assunto" required maxlength="50">
      </div>
      <div class="form-group">
        <label for="assunto">Endereço</label>
        <input type="text" placeholder="Exemplo: Rua da Silva Silva 123" id="assunto" name="assunto" required>
      </div>
      <div class="form-group">
      <div style="margin-bottom: 30px">
      <button type="submit" class="btn-submit">CADASTRAR</button>
      <button type="reset" class="btn-reset">LIMPAR</button>
      </div>
